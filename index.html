<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cazadores de la Anaconda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="menu-screen" class="screen active">
        <h1>🐍 Cazadores de la Anaconda</h1>
        <p>Juego cooperativo para 2 jugadores</p>
        <button id="start-btn">INICIAR AVENTURA</button>
        <div class="instructions">
            <p>Jugador 1: Lado izquierdo</p>
            <p>Jugador 2: Lado derecho</p>
            <p>¡Cooperen para atrapar la anaconda!</p>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-header">
            <div id="level-indicator">Fase 1</div>
            <div id="cooperation-meter">
                <span>Cooperación:</span>
                <div id="coop-bar"><div id="coop-fill"></div></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="controls-container">
            <div id="controls-p1" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
            
            <div id="controls-p2" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h1>🎉 ¡VICTORIA! 🎉</h1>
        <p>¡Han atrapado a la anaconda!</p>
        <div id="final-stats"></div>
        <button id="replay-btn">JUGAR DE NUEVO</button>
    </div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/player.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/cooperative.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
