<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cazadores de la Anaconda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="id-screen" style="background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
    <p style="color: #00ff00; font-weight: bold;">TU ID: <span id="my-id-display">Cargando...</span></p>
    <input type="text" id="peer-id-input" placeholder="Pega el ID de tu amigo" style="padding: 10px; width: 80%; border-radius: 5px; border: none;">
    <button id="join-btn" style="background: #2ecc71; margin-top: 10px; padding: 10px 20px;">UNIRSE A AMIGO</button>
</div>

<button id="start-btn">INICIAR AVENTURA</button>

    <div id="game-screen" class="screen">
        <div id="game-header">
            <div id="level-indicator">Fase 1</div>
            <div id="cooperation-meter">
                <span>Cooperación:</span>
                <div id="coop-bar"><div id="coop-fill"></div></div>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <div id="controls-container">
            <div id="controls-p1" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
            
            <div id="controls-p2" class="controls">
                <button class="ctrl-btn" data-action="up">↑</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" data-action="left">←</button>
                    <button class="ctrl-btn action-btn" data-action="action">⚡</button>
                    <button class="ctrl-btn" data-action="right">→</button>
                </div>
                <button class="ctrl-btn" data-action="down">↓</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h1>🎉 ¡VICTORIA! 🎉</h1>
        <p>¡Han atrapado a la anaconda!</p>
        <div id="final-stats"></div>
        <button id="replay-btn">JUGAR DE NUEVO</button>
    </div>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/player.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/cooperative.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
